<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greffe Rénale — Télécharger l'application</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .icon {
            width: 80px; height: 80px;
            background: #1565C0;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: #fff;
            font-size: 40px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .subtitle { color: #888; margin-bottom: 1.5rem; }
        .download-btn {
            display: inline-block;
            background: #1565C0;
            color: #fff;
            text-decoration: none;
            padding: 0.9rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: background 0.2s;
            width: 100%;
        }
        .download-btn:hover { background: #0d47a1; }
        .instructions {
            margin-top: 1.5rem;
            text-align: left;
            font-size: 0.85rem;
            color: #666;
            line-height: 1.6;
        }
        .instructions ol { padding-left: 1.2rem; }
        .instructions li { margin-bottom: 0.3rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">+</div>
        <h1>Greffe Rénale</h1>
        <p class="subtitle">Application mobile</p>

        <a href="/greffe-renale.apk" class="download-btn">
            Télécharger l'APK
        </a>

        <div class="instructions">
            <p><strong>Installation :</strong></p>
            <ol>
                <li>Appuyez sur « Télécharger l'APK »</li>
                <li>Ouvrez le fichier téléchargé</li>
                <li>Autorisez l'installation depuis cette source si demandé</li>
                <li>Appuyez sur « Installer »</li>
            </ol>
        </div>
    </div>
</body>
</html>
